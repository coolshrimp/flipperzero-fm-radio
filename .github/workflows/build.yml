name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: official
            sdk-channel: release
            sdk-index-url: ""
          - name: official-dev
            sdk-channel: dev
            sdk-index-url: ""
          - name: unleashed
            sdk-channel: release
            sdk-index-url: https://up.unleashedflip.com/directory.json
          - name: momentum
            sdk-channel: release
            sdk-index-url: https://up.momentum-fw.dev/firmware/directory.json
    name: Build for ${{ matrix.name }}
    steps:
      - uses: actions/checkout@v4

      - name: Build FAP
        id: build
        uses: flipperdevices/flipperzero-ufbt-action@v0.1
        with:
          sdk-channel: ${{ matrix.sdk-channel }}
          sdk-index-url: ${{ matrix.sdk-index-url }}

      - name: Rename FAP with firmware name
        shell: bash
        run: |
          mkdir -p release-out
          for f in ${{ steps.build.outputs.fap-artifacts }}; do
            cp "$f" "release-out/fm_radio-${GITHUB_REF_NAME}-${{ matrix.name }}.fap"
          done
          echo "Built against SDK: ${{ steps.build.outputs.suffix }}"
          ls -la release-out

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: fm_radio-${{ matrix.name }}
          path: release-out/*.fap

  # Single job attaches all four builds to the Release at once,
  # avoiding the race of parallel jobs creating the same release.
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-out
          merge-multiple: true

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-out/*.fap
          generate_release_notes: true
          body: |
            | File | Firmware |
            |------|----------|
            | `official` | Official Flipper firmware (release) |
            | `official-dev` | Official Flipper firmware (dev branch) |
            | `unleashed` | Unleashed firmware |
            | `momentum` | Momentum firmware |

            Copy the matching `.fap` to `SD Card/apps/GPIO/` or install via qFlipper.
